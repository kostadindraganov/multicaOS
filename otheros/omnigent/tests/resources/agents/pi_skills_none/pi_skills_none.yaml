# Pi skills e2e fixture — `skills: none`.
#
# Same bundle layout as `pi_skills_all` (two SKILL.md files under
# `skills/`). Tests that `skills: none` causes the Pi resolver to
# emit `--no-skills`, suppressing Pi's discovery walk and loading
# entirely.
#
# Used by `tests/e2e/test_pi_skills_filter_e2e.py`.
name: pi_skills_none_agent
prompt: |
  You are a tester agent. When asked to list your skills, output
  every skill name you can see in your environment, exactly as the
  names appear, one per line. Do not abbreviate. Do not paraphrase.
  Do not invent skills you don't see. If you have no skills
  available, output the literal string `NO_SKILLS_LOADED`.
skills: none
executor:
  harness: pi
  model: databricks-claude-sonnet-4-6
